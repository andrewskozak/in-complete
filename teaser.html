</section>

<script>

const params = new URLSearchParams(window.location.search);

document.getElementById("building-text").textContent = params.get("building");
document.getElementById("location-text").textContent = params.get("location");
document.getElementById("restoration-text").textContent = params.get("restoration");
document.getElementById("status-text").textContent = "STATUS: " + params.get("status");

const imageUrl = params.get("image");
const placeholder = document.querySelector(".placeholder-img");

if (imageUrl) {
  placeholder.style.background = `url('${imageUrl}') center/cover no-repeat`;
}

<script>
  const trigger = document.getElementById('timeline-trigger');
  trigger.addEventListener('click', function(e) {
    e.preventDefault();   // Stop any default navigation
    e.stopPropagation();  // Stop it from bubbling up in iframe

    // Send message to parent window to open timeline overlay
    window.parent.postMessage({
      action: 'openTimeline',
      building: new URLSearchParams(window.location.search).get('building')
    }, '*');
  });
</script>
